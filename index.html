<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trending Games Catalog">
    <title>Trending Games Catalog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }
        .game-card {
            background-color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .game-card h2 {
            margin: 0 0 10px 0;
        }
        .game-card a {
            color: #4CAF50;
            text-decoration: none;
        }
        .game-card a:hover {
            text-decoration: underline;
        }
        #searchBar {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <header>
        <h1>Trending Games Catalog</h1>
    </header>
    <div class="container">
        <input type="text" id="searchBar" placeholder="Search for a game...">
        <div id="gameContainer">
            <!-- Example game cards -->
            <div class="game-card">
                <h2>Example Game 1</h2>
                <p><a href="https://example.com/game1" target="_blank">Play Now</a></p>
            </div>
            <div class="game-card">
                <h2>Example Game 2</h2>
                <p><a href="https://example.com/game2" target="_blank">Play Now</a></p>
            </div>
        </div>
    </div>

    <script>
        const searchBar = document.getElementById('searchBar');
        const gameContainer = document.getElementById('gameContainer');

        searchBar.addEventListener('input', () => {
            const filter = searchBar.value.toLowerCase();
            const cards = gameContainer.getElementsByClassName('game-card');
            for (let card of cards) {
                const title = card.getElementsByTagName('h2')[0].textContent.toLowerCase();
                card.style.display = title.includes(filter) ? '' : 'none';
            }
        });
    </script>
</body>
</html>
